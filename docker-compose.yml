# ── docker-compose.yml — AskData ─────────────────────────────────────────────
# Deux services :
#   - backend  : API FastAPI (Python)  → accessible sur http://localhost:8009
#   - frontend : React + Nginx         → accessible sur http://localhost:3000
#
# Architecture des appels API :
#   Navigateur → http://localhost:3000/api/...
#       → Nginx (frontend) proxifie vers http://backend:8000/api/...
#       → FastAPI répond
#
# Avantage : pas de CORS, URL relative dans le code React, tout passe par le port 3000.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Variables d'environnement depuis .env (DB_TYPE, DB_HOST, clés API…)
    env_file:
      - ./.env
    # Port 8009 exposé sur l'hôte pour accès direct si besoin (debug, tests)
    ports:
      - "8009:8000"
    # Volumes pour les données générées par le pipeline
    volumes:
      - ./requests:/app/requests   # Requêtes utilisateur (.txt)
      - ./sql:/app/sql             # Requêtes SQL générées
      - ./schema:/app/schema       # Schémas de bases de données
      - ./dataviz:/app/dataviz     # Scripts de visualisation Python
      - ./outputs:/app/outputs     # Résultats (CSV, HTML, Markdown)
      - ./runtime:/app/runtime     # Config runtime (db_config.json, llm_config.json)
    networks:
      - askdata-network

  # ── Frontend Nginx ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Port 3000 : point d'entrée principal de l'application
    ports:
      - "3000:80"
    # Le frontend démarre après le backend
    depends_on:
      - backend
    networks:
      - askdata-network

# ── Réseau interne Docker ────────────────────────────────────────────────────
# Permet à Nginx (frontend) de joindre FastAPI (backend) via http://backend:8000
networks:
  askdata-network:
    driver: bridge
