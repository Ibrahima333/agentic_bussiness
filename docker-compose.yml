# ── docker-compose.yml — AskData ─────────────────────────────────────────────
# Deux services :
#   - backend  : API FastAPI (Python)  → accessible sur http://localhost:8009
#   - frontend : React + Nginx (HTTPS) → accessible sur https://localhost:3000
#
# Architecture des appels API :
#   Navigateur → https://localhost:3000/api/...
#       → Nginx (frontend, TLS terminé) proxifie vers http://backend:8000/api/...
#       → FastAPI répond
#
# HTTPS : certificat auto-signé généré au build. Le navigateur affichera un
# avertissement à la première ouverture → cliquer "Continuer quand même".
# En production, monter un vrai certificat via volumes (voir frontend/Dockerfile).
#
# Avantage : pas de CORS, URL relative dans le code React, tout passe par le port 3000.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL Auth — base dédiée aux utilisateurs, KPIs, dashboard, historique ───
  mysql-auth:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD:-askdata_root_secret}
      MYSQL_DATABASE: askdata_auth
      MYSQL_USER: ${AUTH_DB_USER:-askdata}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD:-askdata_secret}
    volumes:
      - mysql_auth_data:/var/lib/mysql
    networks:
      - askdata-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${AUTH_DB_ROOT_PASSWORD:-askdata_root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer — interface web légère pour inspecter mysql-auth ─────────────────
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql-auth:
        condition: service_healthy
    networks:
      - askdata-network
    environment:
      ADMINER_DEFAULT_SERVER: mysql-auth

  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    # Variables d'environnement depuis .env (DB_TYPE, DB_HOST, clés API…)
    env_file:
      - ./.env
    # Port 8009 exposé sur l'hôte pour accès direct si besoin (debug, tests)
    ports:
      - "8009:8000"
    # Volumes pour les données générées par le pipeline
    volumes:
      - ./requests:/app/requests   # Requêtes utilisateur (.txt)
      - ./sql:/app/sql             # Requêtes SQL générées
      - ./schema:/app/schema       # Schémas de bases de données
      - ./dataviz:/app/dataviz     # Scripts de visualisation Python
      - ./outputs:/app/outputs     # Résultats (CSV, HTML, Markdown)
      - ./runtime:/app/runtime     # Config runtime (db_config.json, llm_config.json)
    depends_on:
      mysql-auth:
        condition: service_healthy
    networks:
      - askdata-network

  # ── Frontend Nginx ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Port 3000 : point d'entrée HTTPS principal → https://localhost:3000
    # Port 3080 : redirection HTTP → HTTPS (optionnel, pratique en prod)
    ports:
      - "3000:443"
      - "3080:80"
    # Le frontend démarre après le backend
    depends_on:
      - backend
    networks:
      - askdata-network

# ── Réseau interne Docker ────────────────────────────────────────────────────
networks:
  askdata-network:
    driver: bridge

# ── Volumes persistants ──────────────────────────────────────────────────────
volumes:
  mysql_auth_data:
